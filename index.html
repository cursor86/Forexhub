<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global FX Dashboard | SS Traders Education</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">SS Traders <span>Education</span></div>
            <ul class="nav-links">
                <li><a href="#converter">Converter</a></li>
                <li><a href="#market-trends">Market Trends</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <!-- TOP AD SLOT -->
        <div class="ad-slot top-banner">
            <span class="ad-label">Advertisement</span>
            <!-- Place your AdSense code here -->
        </div>

        <div class="dashboard-grid">
            <!-- CONVERTER SECTION -->
            <section id="converter" class="converter-panel">
                <div class="panel-header">
                    <h1>Currency Converter</h1>
                    <p id="live-status">● Live Market Connection</p>
                </div>
                <div class="converter-ui">
                    <div class="input-group">
                        <label>Amount</label>
                        <input type="number" id="amount" value="1.00">
                    </div>
                    <div class="selector-row">
                        <select id="fromCurrency"></select>
                        <button id="swapBtn">⇅</button>
                        <select id="toCurrency"></select>
                    </div>
                    <button id="convertBtn">Convert Now</button>
                    <div class="result-area">
                        <p id="rate-text">1 USD = 0.00 ---</p>
                        <h2 id="converted-total">0.00</h2>
                    </div>
                </div>
            </section>

            <!-- SIDEBAR AD SLOT -->
            <div class="ad-slot sidebar-ad">
                <span class="ad-label">Sponsored</span>
                <!-- Place your AdSense code here -->
            </div>
        </div>

        <!-- 24H MARKET PERFORMANCE TABLE -->
        <section id="market-trends" class="trends-panel">
            <h2>Market Trends (Last 24 Hours)</h2>
            <div class="table-responsive">
                <table id="performance-table">
                    <thead>
                        <tr>
                            <th>Currency Pair</th>
                            <th>Current Rate</th>
                            <th>24h Change</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="trends-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="container">
        <p>&copy; 2026 SS Traders Education. All rates informational only.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
